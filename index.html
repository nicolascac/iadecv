<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Chatbot na Nuvem</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .historico { height: 300px; overflow-y: auto; background: #eef2f3; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .mensagem { margin-bottom: 10px; padding: 8px; border-radius: 5px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .bot { background: #ddd; color: black; align-self: flex-start; border-bottom-left-radius: 0; }
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .btn-danger { background: #dc3545; width: 100%; margin-top: 5px; }
        .btn-danger:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🤖 Assistente IA</h2>
        <div class="historico" id="historico"></div>
        <div class="input-group">
            <input type="text" id="pergunta" placeholder="Digite sua pergunta..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
        <!-- Botão do Desafio Hacker! -->
        <button class="btn-danger" onclick="apagarMemoria()">🗑️ Apagar Memória</button>
    </div>

    <script>
        // ATENÇÃO: COLE A URL DO SEU RENDER AQUI (Sem a barra no final)
        const URL_BACKEND = "https://SEU-LINK-AQUI.onrender.com";

        async function enviarMensagem() {
            const input = document.getElementById("pergunta");
            const historico = document.getElementById("historico");
            const texto = input.value;

            if(!texto) return;

            // 1. Mostra a mensagem do usuário na tela
            historico.innerHTML += `<div class="mensagem user">${texto}</div>`;
            input.value = "";
            historico.innerHTML += `<div class="mensagem bot" id="loading">Pensando...</div>`;
            historico.scrollTop = historico.scrollHeight;

            try {
                // 2. Faz o Fetch (POST) para a SUA API na Nuvem
                const resposta = await fetch(`${URL_BACKEND}/api/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pergunta: texto })
                });

                const dados = await resposta.json();

                // 3. Remove o "Pensando..." e mostra a resposta real
                document.getElementById("loading").remove();
                historico.innerHTML += `<div class="mensagem bot">${dados.resposta}</div>`;
                historico.scrollTop = historico.scrollHeight;

            } catch (erro) {
                document.getElementById("loading").innerHTML = "Erro de conexão com o Servidor ❌";
            }
        }

        // Função do Desafio Hacker
        async function apagarMemoria() {
            if(!confirm("Tem certeza que deseja apagar toda a memória da IA?")) return;
            
            try {
                await fetch(`${URL_BACKEND}/api/chat/limpar`, { method: 'DELETE' });
                document.getElementById("historico").innerHTML = ""; // Limpa a tela
                alert("Memória formatada! A IA esqueceu tudo. 🧹");
            } catch (erro) {
                alert("Erro ao tentar apagar a memória do servidor.");
            }
        }
    </script>
</body>
</html>
